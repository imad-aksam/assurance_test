version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: devis_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: devis_assurance
      MYSQL_USER: devis
      MYSQL_PASSWORD: devis_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: devis_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_USER: devis
      PMA_PASSWORD: devis_password
    ports:
      - "8080:80"
    depends_on:
      - mysql

volumes:
  mysql_data:
